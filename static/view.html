<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SwimTimer — Live View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --bg-card: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --cyan: #00f0ff;
      --green: #00d97e;
      --red: #ff6b6b;
      --amber: #ffb347;
      --font: 'Outfit', system-ui, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 240, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 217, 126, 0.04) 0%, transparent 50%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 12px;
      padding-bottom: calc(12px + var(--safe-bottom));
      gap: 10px;
      transition: background-color 250ms ease;
    }

    /* ── Race-phase background cue (mirrors dashboard & remote) ──
       BLACK at rest (idle/completed), GREEN when ready, YELLOW while running. */
    body.race-bg-idle,
    body.race-bg-completed {
      background: #000000;
      background-image: none;
    }
    body.race-bg-ready {
      background: #066b3a;
      background-image:
        radial-gradient(ellipse 90% 60% at 50% 20%, rgba(0, 230, 130, 0.45) 0%, transparent 65%),
        linear-gradient(180deg, #043d24 0%, #066b3a 50%, #043d24 100%);
    }
    body.race-bg-running {
      background: #a88a00;
      background-image:
        radial-gradient(ellipse 90% 60% at 50% 20%, rgba(255, 225, 60, 0.55) 0%, transparent 65%),
        linear-gradient(180deg, #7a6500 0%, #a88a00 50%, #7a6500 100%);
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      text-align: center;
      flex-shrink: 0;
      padding: 8px 0;
    }
    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .status {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .header .status .dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .header .view-tag {
      display: inline-block;
      margin-left: 4px;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1px 6px;
    }

    /* ── Race Info Bar ─────────────────────────────── */
    .race-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
      padding: 8px 16px;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
    }
    .race-info .timer {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      min-width: 140px;
      text-align: center;
    }
    .race-info .timer.running {
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
    }
    .race-info .state-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(100, 116, 139, 0.3);
      color: var(--text-dim);
    }
    .race-info .state-badge.ready { background: rgba(0, 240, 255, 0.15); color: var(--cyan); }
    .race-info .state-badge.running { background: rgba(0, 217, 126, 0.15); color: var(--green); }
    .race-info .state-badge.completed { background: rgba(255, 179, 71, 0.15); color: var(--amber); }

    /* ── Lanes (read-only) — stacked vertically, finish order with place ───── */
    .lane-list {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    .lane-row {
      display: grid;
      grid-template-columns: 2.8em 2.2em 1fr auto;
      align-items: center;
      column-gap: 18px;
      border: 2px solid var(--glass-border);
      border-radius: 14px;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      padding: 10px 18px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .lane-row .place {
      font-size: clamp(1.3rem, 3.5vw, 1.9rem);
      font-weight: 800;
      text-align: center;
      color: var(--text-dim);
      line-height: 1;
    }
    .lane-row.finished .place { color: var(--lane-color, var(--cyan)); }
    /* Lane is a filled colored circle, clearly distinct from the position ordinal. */
    .lane-row .lane-badge {
      justify-self: center;
      width: 1.9em;
      height: 1.9em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: clamp(0.95rem, 2.6vw, 1.35rem);
      font-weight: 800;
      color: #0b1220;
      background: var(--lane-color, #888);
    }
    .lane-row .swimmer { display: flex; flex-direction: column; min-width: 0; }
    .lane-row .swimmer .nm {
      font-weight: 700;
      font-size: clamp(1rem, 3vw, 1.25rem);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lane-row .swimmer .sd { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.5px; }
    .lane-row .time {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text-dim);
      text-align: right;
    }

    /* Lane-specific accent colors */
    .lane-row[data-lane="1"] { --lane-color: #ff6b6b; }
    .lane-row[data-lane="2"] { --lane-color: #00f0ff; }
    .lane-row[data-lane="3"] { --lane-color: #00d97e; }
    .lane-row[data-lane="4"] { --lane-color: #ffb347; }
    .lane-row[data-lane="5"] { --lane-color: #a78bfa; }
    .lane-row[data-lane="6"] { --lane-color: #f472b6; }

    .lane-row.finished { border-color: var(--lane-color); box-shadow: 0 0 18px color-mix(in srgb, var(--lane-color) 25%, transparent); }
    .lane-row.finished .time { color: var(--lane-color); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🏊 SwimTimer — Live View</h1>
    <div class="status">
      <span class="dot" id="ws-dot"></span>
      <span id="ws-status-text">Connecting...</span>
      <span class="view-tag">View only</span>
    </div>
  </div>

  <!-- Race Info -->
  <div class="race-info">
    <span class="state-badge" id="state-badge">IDLE</span>
    <span class="timer" id="master-timer">00:00.00</span>
  </div>

  <!-- Lanes (read-only) — stacked vertically, finish order with place -->
  <div class="lane-list" id="lane-list"></div>

  <script>
    /* ================================================================
       SwimTimer Live View — read-only spectator display.
       Listens to the same WebSocket broadcasts as the dashboard/remote
       and never sends an action. Server hydrates with full_state on connect.
       ================================================================ */

    let ws = null;
    let raceState = 'idle';
    let shownHeat = null; // event-heat currently displayed (to keep results until next Prepare)
    let clockRAF = null;
    let reconnectDelay = 1000;
    const MAX_RECONNECT = 10000;

    // ── WebSocket ───────────────────────────────────
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        reconnectDelay = 1000;
        document.getElementById('ws-dot').classList.add('connected');
        document.getElementById('ws-status-text').textContent = 'Connected';
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('connected');
        document.getElementById('ws-status-text').textContent = 'Reconnecting...';
        setTimeout(connectWS, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT);
      };

      ws.onerror = () => { ws.close(); };

      ws.onmessage = (evt) => {
        try { handleMessage(JSON.parse(evt.data)); }
        catch (e) { /* ignore parse errors */ }
      };
    }

    // ── Message Handling (listen only) ──────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'race_state':
          raceState = msg.state;
          updateStateBadge();
          if (raceState === 'running') startClock(msg.elapsed || 0);
          else { stopClock(); if (msg.elapsed != null) updateTimerDisplay(msg.elapsed); }
          break;

        case 'lane_time':
          updateLaneTime(msg.lane, msg.time, msg.is_finish);
          break;

        case 'full_state': {
          raceState = msg.state || 'idle';
          updateStateBadge();
          // Keep the finished heat on screen until the next heat is PREPARED (ready)
          // or the event/heat changes — not on completion/idle.
          const heatKey = msg.event + '-' + msg.heat;
          if (raceState === 'ready' || (shownHeat != null && heatKey !== shownHeat)) resetLanes();
          shownHeat = heatKey;
          if (msg.lanes) {
            for (const [lane, info] of Object.entries(msg.lanes)) {
              setLaneInfo(parseInt(lane), info.name || '', info.seed || '', info.time, info.finished);
            }
            render();
          }
          if (raceState === 'running') startClock(msg.elapsed || 0);
          else if (msg.elapsed != null) updateTimerDisplay(msg.elapsed);
          break;
        }

        default:
          break;
      }
    }

    // ── UI Updates ──────────────────────────────────
    function updateStateBadge() {
      const badge = document.getElementById('state-badge');
      badge.textContent = raceState.toUpperCase();
      badge.className = 'state-badge ' + raceState;

      // Whole-screen background cue: black at rest, green ready, yellow running.
      document.body.classList.remove(
        'race-bg-idle', 'race-bg-ready', 'race-bg-running', 'race-bg-completed');
      document.body.classList.add('race-bg-' + raceState);
    }

    function updateTimerDisplay(seconds) {
      const el = document.getElementById('master-timer');
      el.textContent = formatTime(seconds);
      el.classList.toggle('running', raceState === 'running');
    }

    // ── Lane model + sorted render (finish order, with place) ──────────────
    const laneData = {};
    for (let i = 1; i <= 6; i++) laneData[i] = { name: '', seed: '', time: null, finished: false };

    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
    function ordinal(n) { const s = ['th', 'st', 'nd', 'rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }

    function updateLaneTime(lane, time, isFinish) {
      const d = laneData[lane]; if (!d) return;
      d.time = time;
      if (isFinish) d.finished = true;
      render();
    }
    // Set a lane's swimmer info from full_state (render is called once after the loop).
    function setLaneInfo(lane, name, seed, time, finished) {
      const d = laneData[lane]; if (!d) return;
      d.name = name || ''; d.seed = seed || '';
      if (time != null) d.time = time;          // keep any live time if full_state has none
      if (finished) d.finished = true;
    }
    function resetLanes() {
      for (let i = 1; i <= 6; i++) laneData[i] = { name: '', seed: '', time: null, finished: false };
      render();
    }

    // Render the six lanes stacked vertically: finished lanes first (by time, with
    // place), then the rest in lane order.
    function render() {
      const list = document.getElementById('lane-list');
      if (!list) return;
      const lanes = [];
      for (let i = 1; i <= 6; i++) lanes.push(Object.assign({ lane: i }, laneData[i]));
      const finished = lanes.filter(function (l) { return l.time != null; }).sort(function (a, b) { return a.time - b.time; });
      const pending = lanes.filter(function (l) { return l.time == null; }).sort(function (a, b) { return a.lane - b.lane; });
      let html = '';
      finished.concat(pending).forEach(function (l, idx) {
        const isFin = l.time != null;
        const nm = l.name ? esc(l.name) : ('Lane ' + l.lane);
        const sd = l.seed ? ('seed ' + esc(l.seed)) : '';
        html += '<div class="lane-row' + (isFin ? ' finished' : '') + '" data-lane="' + l.lane + '">'
          + '<span class="place">' + (isFin ? (idx + 1) : '') + '</span>'
          + '<span class="lane-badge">' + l.lane + '</span>'
          + '<span class="swimmer"><span class="nm">' + nm + '</span><span class="sd">' + sd + '</span></span>'
          + '<span class="time">' + (isFin ? formatTime(l.time) : '') + '</span></div>';
      });
      list.innerHTML = html;
    }

    // ── Clock ───────────────────────────────────────
    let clockStartLocal = null;
    let clockBaseElapsed = 0;

    function startClock(baseElapsed) {
      stopClock();
      clockBaseElapsed = baseElapsed || 0;
      clockStartLocal = performance.now();
      tickClock();
    }

    function tickClock() {
      const elapsed = clockBaseElapsed + (performance.now() - clockStartLocal) / 1000;
      updateTimerDisplay(elapsed);
      clockRAF = requestAnimationFrame(tickClock);
    }

    function stopClock() {
      if (clockRAF) { cancelAnimationFrame(clockRAF); clockRAF = null; }
    }

    // ── Time Formatting ─────────────────────────────
    function formatTime(sec) {
      if (sec == null || sec < 0) return '00:00.00';
      const mins = Math.floor(sec / 60);
      const secs = sec - mins * 60;
      const whole = Math.floor(secs);
      const hundredths = Math.floor((secs - whole) * 100);
      return `${String(mins).padStart(2, '0')}:${String(whole).padStart(2, '0')}.${String(hundredths).padStart(2, '0')}`;
    }

    // ── Init ────────────────────────────────────────
    updateStateBadge();
    render();
    connectWS();
  </script>
</body>
</html>
